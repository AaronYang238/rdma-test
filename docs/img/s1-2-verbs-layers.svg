<svg xmlns="http://www.w3.org/2000/svg" width="720" height="360" font-family="sans-serif" font-size="12">
  <rect width="720" height="360" fill="#fbfbfd"/>
  <text x="360" y="24" text-anchor="middle" font-weight="bold">Verbs 软硬件分层与两条路径</text>

  <!-- user space -->
  <rect x="60" y="44" width="600" height="86" fill="#e3f2fd" stroke="#1565c0"/>
  <text x="76" y="62" fill="#1565c0" font-weight="bold">用户态</text>
  <rect x="90" y="70" width="200" height="44" fill="#fff" stroke="#1565c0"/>
  <text x="190" y="90" text-anchor="middle" font-size="11">应用 / librdmacm</text>
  <text x="190" y="106" text-anchor="middle" font-size="10" fill="#999">rdma_* 便捷封装</text>
  <rect x="320" y="70" width="150" height="44" fill="#fff" stroke="#1565c0"/>
  <text x="395" y="90" text-anchor="middle" font-size="11">libibverbs</text>
  <text x="395" y="106" text-anchor="middle" font-size="10" fill="#999">ibv_* API</text>
  <rect x="500" y="70" width="140" height="44" fill="#fff" stroke="#1565c0"/>
  <text x="570" y="90" text-anchor="middle" font-size="11">provider</text>
  <text x="570" y="106" text-anchor="middle" font-size="10" fill="#999">libmlx5 等</text>

  <!-- kernel -->
  <rect x="60" y="150" width="600" height="70" fill="#fff3e0" stroke="#ef6c00"/>
  <text x="76" y="168" fill="#ef6c00" font-weight="bold">内核</text>
  <rect x="90" y="176" width="240" height="34" fill="#fff" stroke="#ef6c00"/>
  <text x="210" y="198" text-anchor="middle" font-size="11">uverbs (控制面：创建 QP/MR/CQ)</text>
  <rect x="360" y="176" width="280" height="34" fill="#eceff1" stroke="#90a4ae" stroke-dasharray="4"/>
  <text x="500" y="198" text-anchor="middle" font-size="11" fill="#999">数据面不经内核（旁路）</text>

  <!-- hw -->
  <rect x="60" y="240" width="600" height="50" fill="#ede7f6" stroke="#5e35b1"/>
  <text x="76" y="270" fill="#5e35b1" font-weight="bold">硬件</text>
  <text x="400" y="270" text-anchor="middle" font-size="11">RNIC：QP/CQ 引擎 · MTT/MPT · DMA</text>

  <!-- paths -->
  <line x1="570" y1="114" x2="570" y2="240" stroke="#2e7d32" stroke-width="2" marker-end="url(#g)"/>
  <text x="600" y="180" fill="#2e7d32" font-size="10">数据面</text>
  <text x="600" y="194" fill="#2e7d32" font-size="10">直达硬件</text>
  <line x1="210" y1="114" x2="210" y2="176" stroke="#ef6c00" stroke-width="2" marker-end="url(#o)"/>
  <text x="120" y="146" fill="#ef6c00" font-size="10">控制面经 syscall/uverbs</text>

  <text x="360" y="320" text-anchor="middle" fill="#555" font-size="11">创建资源走内核（慢、罕见）；收发走用户态 doorbell + DMA（快、频繁）</text>
  <text x="360" y="342" text-anchor="middle" fill="#c62828" font-size="11">"Kernel Bypass" 指的是数据面，而非控制面</text>
  <defs>
    <marker id="g" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#2e7d32"/></marker>
    <marker id="o" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#ef6c00"/></marker>
  </defs>
</svg>
