<svg xmlns="http://www.w3.org/2000/svg" width="720" height="320" font-family="sans-serif" font-size="12">
  <rect width="720" height="320" fill="#fbfbfd"/>
  <text x="360" y="22" text-anchor="middle" font-weight="bold">多 QP / 多核扩展与 NUMA 亲和</text>

  <!-- node 0 -->
  <rect x="30" y="40" width="310" height="220" fill="#e3f2fd" stroke="#1565c0" stroke-dasharray="5"/>
  <text x="185" y="60" text-anchor="middle" font-weight="bold" fill="#1565c0">NUMA Node 0</text>
  <rect x="50"  y="74" width="80" height="34" fill="#fff" stroke="#1565c0"/>
  <text x="90"  y="96" text-anchor="middle" font-size="11">Core 0</text>
  <rect x="150" y="74" width="80" height="34" fill="#fff" stroke="#1565c0"/>
  <text x="190" y="96" text-anchor="middle" font-size="11">Core 1</text>
  <rect x="50"  y="120" width="80" height="34" fill="#e8f5e9" stroke="#2e7d32"/>
  <text x="90"  y="142" text-anchor="middle" font-size="11">QP₀ · CQ₀</text>
  <rect x="150" y="120" width="80" height="34" fill="#e8f5e9" stroke="#2e7d32"/>
  <text x="190" y="142" text-anchor="middle" font-size="11">QP₁ · CQ₁</text>
  <rect x="70" y="170" width="200" height="30" fill="#ede7f6" stroke="#5e35b1"/>
  <text x="170" y="190" text-anchor="middle" font-size="11">本地内存（低延迟 DMA）</text>
  <rect x="50"  y="214" width="240" height="34" fill="#fff3e0" stroke="#ef6c00"/>
  <text x="170" y="236" text-anchor="middle" font-size="11">RNIC（本节点 PCIe）</text>

  <!-- node 1 (wrong) -->
  <rect x="380" y="40" width="310" height="220" fill="#fff3e0" stroke="#ef6c00" stroke-dasharray="5"/>
  <text x="535" y="60" text-anchor="middle" font-weight="bold" fill="#ef6c00">NUMA Node 1（跨节点）</text>
  <rect x="400" y="74" width="80" height="34" fill="#fff" stroke="#ef6c00"/>
  <text x="440" y="96" text-anchor="middle" font-size="11">Core 8</text>
  <rect x="400" y="120" width="80" height="34" fill="#ffcdd2" stroke="#c62828"/>
  <text x="440" y="142" text-anchor="middle" font-size="11">QP₂ · CQ₂</text>
  <line x1="440" y1="154" x2="170" y2="214" stroke="#c62828" stroke-dasharray="4" marker-end="url(#r)"/>
  <text x="310" y="196" text-anchor="middle" fill="#c62828" font-size="10">跨 NUMA doorbell</text>
  <text x="310" y="210" text-anchor="middle" fill="#c62828" font-size="10">+30–50 ns 额外延迟</text>

  <text x="360" y="282" text-anchor="middle" fill="#555" font-size="11">原则：QP/CQ/buffer 与 RNIC 在同一 NUMA 节点；线程绑核（taskset/numactl）</text>
  <text x="360" y="302" text-anchor="middle" fill="#2e7d32" font-size="11">每个工作线程独享 QP+CQ，避免锁竞争；共享 CQ 需原子 poll</text>
  <defs><marker id="r" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#c62828"/></marker></defs>
</svg>
