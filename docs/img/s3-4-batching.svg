<svg xmlns="http://www.w3.org/2000/svg" width="720" height="290" font-family="sans-serif" font-size="12">
  <rect width="720" height="290" fill="#fbfbfd"/>
  <text x="360" y="22" text-anchor="middle" font-weight="bold">批处理与链式 WR：一次 doorbell 驱动多个 WR</text>

  <!-- single doorbell per WR -->
  <text x="180" y="48" text-anchor="middle" fill="#c62828">逐个 post（高 doorbell 开销）</text>
  <rect x="40"  y="60" width="80" height="32" fill="#ffcdd2" stroke="#c62828"/>
  <text x="80"  y="80" text-anchor="middle" font-size="10">WR₁</text>
  <text x="80"  y="104" text-anchor="middle" font-size="9" fill="#c62828">doorbell</text>
  <rect x="150" y="60" width="80" height="32" fill="#ffcdd2" stroke="#c62828"/>
  <text x="190" y="80" text-anchor="middle" font-size="10">WR₂</text>
  <text x="190" y="104" text-anchor="middle" font-size="9" fill="#c62828">doorbell</text>
  <rect x="260" y="60" width="80" height="32" fill="#ffcdd2" stroke="#c62828"/>
  <text x="300" y="80" text-anchor="middle" font-size="10">WR₃</text>
  <text x="300" y="104" text-anchor="middle" font-size="9" fill="#c62828">doorbell</text>
  <text x="500" y="80" text-anchor="middle" fill="#c62828" font-size="11">每个 WR 各自敲一次 doorbell</text>

  <!-- chained WR -->
  <text x="180" y="136" text-anchor="middle" fill="#2e7d32">链式 WR（低 doorbell 开销）</text>
  <rect x="40"  y="150" width="80" height="32" fill="#c8e6c9" stroke="#2e7d32"/>
  <text x="80"  y="170" text-anchor="middle" font-size="10">WR₁</text>
  <line x1="120" y1="166" x2="150" y2="166" stroke="#2e7d32" stroke-dasharray="3" marker-end="url(#g)"/>
  <text x="135" y="160" font-size="9">next</text>
  <rect x="150" y="150" width="80" height="32" fill="#c8e6c9" stroke="#2e7d32"/>
  <text x="190" y="170" text-anchor="middle" font-size="10">WR₂</text>
  <line x1="230" y1="166" x2="260" y2="166" stroke="#2e7d32" stroke-dasharray="3" marker-end="url(#g)"/>
  <text x="245" y="160" font-size="9">next</text>
  <rect x="260" y="150" width="80" height="32" fill="#c8e6c9" stroke="#2e7d32"/>
  <text x="300" y="170" text-anchor="middle" font-size="10">WR₃</text>
  <text x="300" y="192" text-anchor="middle" font-size="9" fill="#2e7d32">doorbell（一次）</text>
  <text x="500" y="168" text-anchor="middle" fill="#2e7d32" font-size="11">ibv_post_send(list) 一次调用</text>
  <text x="500" y="184" text-anchor="middle" fill="#2e7d32" font-size="11">仅最后一个 WR 敲 doorbell</text>

  <!-- SGE -->
  <rect x="40" y="220" width="640" height="50" fill="#ede7f6" stroke="#5e35b1"/>
  <text x="360" y="240" text-anchor="middle" font-size="11" font-weight="bold">SGE 聚合（Scatter-Gather）</text>
  <text x="360" y="258" text-anchor="middle" font-size="11">单个 WR 的 sge[] 数组可指向多段不连续内存 → 一次传输跨多 buffer，无需拷贝聚合</text>

  <defs><marker id="g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#2e7d32"/></marker></defs>
</svg>
