<svg xmlns="http://www.w3.org/2000/svg" width="720" height="300" font-family="sans-serif" font-size="12">
  <rect width="720" height="300" fill="#fbfbfd"/>
  <text x="360" y="22" text-anchor="middle" font-weight="bold">HugePage 对 MTT 条目数与 TLB 的影响</text>

  <!-- 4K pages side -->
  <rect x="30" y="40" width="310" height="230" fill="#ffebee" stroke="#c62828"/>
  <text x="185" y="60" text-anchor="middle" font-weight="bold" fill="#c62828">4K 普通页</text>
  <text x="185" y="78" text-anchor="middle" font-size="10">1 GB MR = 262,144 个页</text>
  <!-- many small page boxes -->
  <rect x="50" y="88" width="36" height="14" fill="#ef9a9a" stroke="#c62828"/>
  <rect x="92" y="88" width="36" height="14" fill="#ef9a9a" stroke="#c62828"/>
  <rect x="134" y="88" width="36" height="14" fill="#ef9a9a" stroke="#c62828"/>
  <rect x="176" y="88" width="36" height="14" fill="#ef9a9a" stroke="#c62828"/>
  <rect x="218" y="88" width="36" height="14" fill="#ef9a9a" stroke="#c62828"/>
  <rect x="260" y="88" width="36" height="14" fill="#ef9a9a" stroke="#c62828"/>
  <text x="185" y="120" text-anchor="middle" font-size="10">……（262,144 行）</text>
  <!-- MTT -->
  <rect x="70" y="132" width="230" height="80" fill="#fff" stroke="#c62828"/>
  <text x="185" y="148" text-anchor="middle" font-size="10" font-weight="bold">MTT 表</text>
  <rect x="80" y="155" width="210" height="12" fill="#ef9a9a"/>
  <rect x="80" y="170" width="210" height="12" fill="#ef9a9a"/>
  <rect x="80" y="185" width="210" height="12" fill="#ef9a9a"/>
  <text x="185" y="223" text-anchor="middle" font-size="10" fill="#c62828">262,144 条 MTT，TLB 频繁 miss</text>
  <text x="185" y="240" text-anchor="middle" font-size="10" fill="#c62828">地址转换开销大，延迟毛刺明显</text>

  <!-- HugePage side -->
  <rect x="380" y="40" width="310" height="230" fill="#e8f5e9" stroke="#2e7d32"/>
  <text x="535" y="60" text-anchor="middle" font-weight="bold" fill="#2e7d32">2MB HugePage</text>
  <text x="535" y="78" text-anchor="middle" font-size="10">1 GB MR = 512 个页</text>
  <!-- few large page boxes -->
  <rect x="400" y="88" width="80" height="14" fill="#a5d6a7" stroke="#2e7d32"/>
  <rect x="490" y="88" width="80" height="14" fill="#a5d6a7" stroke="#2e7d32"/>
  <rect x="580" y="88" width="80" height="14" fill="#a5d6a7" stroke="#2e7d32"/>
  <text x="535" y="120" text-anchor="middle" font-size="10">……（512 行）</text>
  <!-- MTT -->
  <rect x="420" y="132" width="230" height="80" fill="#fff" stroke="#2e7d32"/>
  <text x="535" y="148" text-anchor="middle" font-size="10" font-weight="bold">MTT 表</text>
  <rect x="430" y="155" width="210" height="12" fill="#a5d6a7"/>
  <rect x="430" y="170" width="210" height="12" fill="#a5d6a7"/>
  <text x="535" y="223" text-anchor="middle" font-size="10" fill="#2e7d32">仅 512 条 MTT，TLB 命中率极高</text>
  <text x="535" y="240" text-anchor="middle" font-size="10" fill="#2e7d32">地址转换快，延迟稳定</text>

  <text x="360" y="282" text-anchor="middle" fill="#555" font-size="11">mmap(MAP_HUGETLB) 或 /dev/hugepages；THP 在 RDMA 下需 mlock 防止页迁移</text>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#555"/></marker>
  </defs>
</svg>
