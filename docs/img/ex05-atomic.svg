<svg xmlns="http://www.w3.org/2000/svg" width="720" height="320" font-family="sans-serif" font-size="12">
  <rect width="720" height="320" fill="#fbfbfd"/>
  <text x="180" y="22" text-anchor="middle" font-weight="bold">Client (发起原子操作)</text>
  <text x="560" y="22" text-anchor="middle" font-weight="bold">Server 内存中的 counter</text>
  <line x1="180" y1="32" x2="180" y2="290" stroke="#1565c0" stroke-width="2"/>
  <line x1="560" y1="32" x2="560" y2="290" stroke="#5e35b1" stroke-width="2"/>

  <rect x="500" y="40" width="120" height="28" fill="#eceff1" stroke="#90a4ae"/>
  <text x="560" y="59" text-anchor="middle" font-size="11">counter = 100</text>

  <!-- fetch add -->
  <line x1="180" y1="100" x2="560" y2="100" stroke="#c62828" stroke-width="2" marker-end="url(#b)"/>
  <text x="365" y="93" text-anchor="middle" fill="#c62828">FETCH_AND_ADD(+5)</text>
  <line x1="560" y1="124" x2="180" y2="124" stroke="#2e7d32" stroke-dasharray="4" marker-end="url(#g)"/>
  <text x="365" y="140" text-anchor="middle" font-size="11" fill="#2e7d32">返回旧值 100</text>
  <rect x="500" y="150" width="120" height="26" fill="#eceff1" stroke="#90a4ae"/>
  <text x="560" y="168" text-anchor="middle" font-size="11">counter = 105</text>

  <!-- cmp swap -->
  <line x1="180" y1="208" x2="560" y2="208" stroke="#c62828" stroke-width="2" marker-end="url(#b)"/>
  <text x="365" y="201" text-anchor="middle" fill="#c62828">CMP_SWAP(expect=105, swap=999)</text>
  <line x1="560" y1="232" x2="180" y2="232" stroke="#2e7d32" stroke-dasharray="4" marker-end="url(#g)"/>
  <text x="365" y="248" text-anchor="middle" font-size="11" fill="#2e7d32">返回旧值 105（相等→交换）</text>
  <rect x="500" y="258" width="120" height="26" fill="#eceff1" stroke="#90a4ae"/>
  <text x="560" y="276" text-anchor="middle" font-size="11">counter = 999</text>

  <text x="180" y="305" text-anchor="middle" font-size="11" fill="#999">网卡内完成读-改-写 · 服务端 CPU 全程零参与</text>
  <defs>
    <marker id="b" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#c62828"/></marker>
    <marker id="g" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#2e7d32"/></marker>
  </defs>
</svg>
