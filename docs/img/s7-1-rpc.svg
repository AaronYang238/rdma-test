<svg xmlns="http://www.w3.org/2000/svg" width="720" height="300">
  <defs>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1565c0"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2e7d32"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef6c00"/>
    </marker>
  </defs>
  <rect width="720" height="300" fill="#fbfbfd"/>
  <text x="360" y="22" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333">极简 RPC over RDMA — 请求/响应流程</text>

  <!-- Client box -->
  <rect x="30" y="50" width="200" height="220" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="130" y="72" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1565c0">客户端 (Client)</text>

  <!-- Client ring buffer -->
  <rect x="50" y="85" width="160" height="45" rx="4" fill="#bbdefb" stroke="#1565c0" stroke-width="1"/>
  <text x="130" y="103" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1565c0">请求环形缓冲</text>
  <text x="130" y="118" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1565c0">[ slot0 | slot1 | slot2 | … ]</text>

  <!-- Client app -->
  <rect x="50" y="155" width="160" height="35" rx="4" fill="#e1f5fe" stroke="#1565c0" stroke-width="1"/>
  <text x="130" y="175" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1565c0">应用线程</text>
  <text x="130" y="188" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1565c0">等待 IMM 通知唤醒</text>

  <!-- Client recv CQE -->
  <rect x="50" y="210" width="160" height="35" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
  <text x="130" y="230" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#2e7d32">Recv CQE</text>
  <text x="130" y="243" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#2e7d32">imm_data = 响应槽索引</text>

  <!-- Server box -->
  <rect x="490" y="50" width="200" height="220" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="590" y="72" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#2e7d32">服务端 (Server)</text>

  <!-- Server ring buffer -->
  <rect x="510" y="85" width="160" height="45" rx="4" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1"/>
  <text x="590" y="103" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#2e7d32">响应环形缓冲</text>
  <text x="590" y="118" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#2e7d32">[ resp0 | resp1 | resp2 | … ]</text>

  <!-- Server CPU -->
  <rect x="510" y="155" width="160" height="35" rx="4" fill="#f1f8e9" stroke="#2e7d32" stroke-width="1"/>
  <text x="590" y="175" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#2e7d32">服务端 CPU</text>
  <text x="590" y="188" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#2e7d32">轮询 head pointer 处理请求</text>

  <!-- Server WRITE_WITH_IMM -->
  <rect x="510" y="210" width="160" height="35" rx="4" fill="#fff3e0" stroke="#ef6c00" stroke-width="1"/>
  <text x="590" y="230" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ef6c00">WRITE_WITH_IMM</text>
  <text x="590" y="243" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#ef6c00">写响应 + 携带槽索引通知</text>

  <!-- Step 1: RDMA WRITE request -->
  <line x1="230" y1="108" x2="490" y2="108" stroke="#1565c0" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="360" y="100" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1565c0">① RDMA WRITE 推送请求</text>
  <text x="360" y="114" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1565c0">（单边，服务端 CPU 不感知）</text>

  <!-- Step 2: server polls -->
  <text x="590" y="148" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#2e7d32">② poll head pointer</text>

  <!-- Step 3: WRITE_WITH_IMM response -->
  <line x1="490" y1="220" x2="230" y2="220" stroke="#ef6c00" stroke-width="2" marker-end="url(#arr-orange)"/>
  <text x="360" y="212" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ef6c00">③ WRITE_WITH_IMM 响应</text>
  <text x="360" y="226" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#ef6c00">（写数据 + 触发对端 Recv CQE）</text>

  <!-- Step 4: client wakes -->
  <text x="130" y="202" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#2e7d32">④ 唤醒</text>
</svg>
