<svg xmlns="http://www.w3.org/2000/svg" width="720" height="300" font-family="sans-serif" font-size="12">
  <rect width="720" height="300" fill="#fbfbfd"/>
  <text x="180" y="22" text-anchor="middle" font-weight="bold">Server (发起 WRITE_WITH_IMM)</text>
  <text x="560" y="22" text-anchor="middle" font-weight="bold">Client (被写 + 收通知)</text>
  <line x1="180" y1="32" x2="180" y2="270" stroke="#5e35b1" stroke-width="2"/>
  <line x1="560" y1="32" x2="560" y2="270" stroke="#1565c0" stroke-width="2"/>

  <text x="560" y="50" text-anchor="middle" font-size="11" fill="#2e7d32">reg_mr(REMOTE_WRITE) · post_recv(IMM)</text>
  <line x1="560" y1="76" x2="180" y2="76" stroke="#1565c0" marker-end="url(#a)"/>
  <text x="370" y="69" text-anchor="middle">SEND: addr + rkey</text>

  <!-- single op carries data + imm -->
  <line x1="180" y1="130" x2="560" y2="130" stroke="#c62828" stroke-width="2.5" marker-end="url(#b)"/>
  <text x="370" y="116" text-anchor="middle" fill="#c62828">WRITE_WITH_IMM：数据 DMA 入 buffer</text>
  <text x="370" y="148" text-anchor="middle" fill="#c62828" font-size="11">+ 32 位立即数 (imm_data)</text>

  <rect x="430" y="168" width="260" height="48" fill="#fff3e0" stroke="#ef6c00"/>
  <text x="560" y="188" text-anchor="middle" font-size="11">消费一个 recv WR → recv CQE</text>
  <text x="560" y="206" text-anchor="middle" font-size="10">opcode=RECV_RDMA_WITH_IMM, imm_data</text>

  <text x="370" y="250" text-anchor="middle" fill="#2e7d32">一次操作既送数据又送通知——省掉示例 01 里额外的 ACK 往返</text>
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#1565c0"/></marker>
    <marker id="b" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#c62828"/></marker>
  </defs>
</svg>
