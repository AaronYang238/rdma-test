<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <rect width="720" height="320" fill="#fbfbfd"/>
  <text x="360" y="22" text-anchor="middle" font-weight="bold" font-size="14">Doorbell 机制：DB record、BlueFlame (WC) 与门铃批处理</text>

  <!-- Step 1: WQE write to SQ buffer -->
  <rect x="30" y="60" width="180" height="80" rx="6" fill="#1565c0"/>
  <text x="120" y="80" text-anchor="middle" fill="white" font-weight="bold" font-size="11">① 写 WQE 到 SQ buffer</text>
  <text x="40" y="98" fill="white" font-size="10">主机内存（环形队列）</text>
  <text x="40" y="113" fill="white" font-size="10">ctrl seg + raddr seg</text>
  <text x="40" y="128" fill="white" font-size="10">+ data seg（inline/指针）</text>

  <!-- wmb barrier -->
  <text x="265" y="92" text-anchor="middle" font-size="10" fill="#c62828" font-weight="bold">wmb()</text>
  <text x="265" y="106" text-anchor="middle" font-size="9" fill="#c62828">序：WQE 先落</text>
  <line x1="210" y1="100" x2="320" y2="100" stroke="#555" marker-end="url(#arrow)"/>

  <!-- Step 2: DB record -->
  <rect x="320" y="60" width="180" height="80" rx="6" fill="#5e35b1"/>
  <text x="410" y="80" text-anchor="middle" fill="white" font-weight="bold" font-size="11">② 更新 DB record</text>
  <text x="330" y="98" fill="white" font-size="10">主机内存中的 dbrec</text>
  <text x="330" y="113" fill="white" font-size="10">记录 SQ 生产者索引</text>
  <text x="330" y="128" fill="white" font-size="10">网卡 DMA 读取以同步</text>

  <!-- mmio_wc barrier -->
  <text x="555" y="92" text-anchor="middle" font-size="10" fill="#c62828" font-weight="bold">mmio_wc</text>
  <text x="555" y="106" text-anchor="middle" font-size="9" fill="#c62828">barrier()</text>
  <line x1="500" y1="100" x2="610" y2="100" stroke="#555" marker-end="url(#arrow)"/>

  <!-- Step 3: BlueFlame BF register -->
  <rect x="610" y="60" width="100" height="80" rx="6" fill="#ef6c00"/>
  <text x="660" y="80" text-anchor="middle" fill="white" font-weight="bold" font-size="11">③ 敲门铃</text>
  <text x="660" y="98" text-anchor="middle" fill="white" font-size="10">BF 寄存器</text>
  <text x="660" y="112" text-anchor="middle" fill="white" font-size="10">(BlueFlame)</text>
  <text x="660" y="126" text-anchor="middle" fill="white" font-size="10">MMIO WC 写</text>

  <!-- HW -->
  <rect x="320" y="240" width="180" height="40" rx="6" fill="#2e7d32"/>
  <text x="410" y="265" text-anchor="middle" fill="white" font-weight="bold">RNIC 取 WQE 执行</text>
  <line x1="660" y1="140" x2="500" y2="245" stroke="#555" marker-end="url(#arrow)"/>

  <!-- BlueFlame inline annotation -->
  <rect x="30" y="170" width="470" height="56" rx="6" fill="#fff3e0" stroke="#ef6c00"/>
  <text x="45" y="190" font-weight="bold" fill="#ef6c00" font-size="11">BlueFlame inline：小 WQE 直接写进 BF 寄存器</text>
  <text x="45" y="207" font-size="10" fill="#333">WC 写合并区，整条 WQE 随门铃一起送达硬件</text>
  <text x="45" y="221" font-size="10" fill="#c62828" font-weight="bold">→ 省去网卡反向 DMA 读 WQE 的一次 PCIe read（延迟优化）</text>

  <!-- doorbell batching note -->
  <rect x="520" y="170" width="190" height="56" rx="6" fill="#e3f2fd" stroke="#1565c0"/>
  <text x="535" y="190" font-weight="bold" fill="#1565c0" font-size="11">门铃批处理</text>
  <text x="535" y="207" font-size="10" fill="#333">写 N 条 WQE 后</text>
  <text x="535" y="221" font-size="10" fill="#333">只敲一次 doorbell（合并）</text>

  <text x="360" y="305" text-anchor="middle" font-size="11" fill="#555">缺任一内存屏障 → 网卡可能读到半成品 WQE 或旧索引（数据损坏 / 卡死）</text>
</svg>
