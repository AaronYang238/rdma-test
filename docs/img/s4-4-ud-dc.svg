<svg xmlns="http://www.w3.org/2000/svg" width="720" height="280" font-family="sans-serif" font-size="12">
  <rect width="720" height="280" fill="#fbfbfd"/>
  <text x="360" y="22" text-anchor="middle" font-weight="bold">UD 一对多 vs DC 动态连接</text>

  <!-- UD -->
  <rect x="30" y="44" width="320" height="200" fill="#fff3e0" stroke="#ef6c00"/>
  <text x="190" y="64" text-anchor="middle" font-weight="bold" fill="#ef6c00">UD（Unreliable Datagram）</text>
  <rect x="130" y="80" width="120" height="36" fill="#fff" stroke="#ef6c00"/>
  <text x="190" y="103" text-anchor="middle" font-size="11">单个 UD QP</text>
  <text x="90"  y="144" text-anchor="middle" font-size="10">目标 A</text>
  <text x="190" y="144" text-anchor="middle" font-size="10">目标 B</text>
  <text x="290" y="144" text-anchor="middle" font-size="10">目标 C</text>
  <line x1="190" y1="116" x2="90"  y2="138" stroke="#ef6c00" marker-end="url(#o)"/>
  <line x1="190" y1="116" x2="190" y2="138" stroke="#ef6c00" marker-end="url(#o)"/>
  <line x1="190" y1="116" x2="290" y2="138" stroke="#ef6c00" marker-end="url(#o)"/>
  <text x="190" y="176" text-anchor="middle" font-size="10">每条消息带 AH（Address Handle）</text>
  <text x="190" y="194" text-anchor="middle" font-size="10">仅 SEND（无 WRITE/READ）</text>
  <text x="190" y="212" text-anchor="middle" font-size="10" fill="#c62828">包可乱序 / 丢失</text>
  <text x="190" y="230" text-anchor="middle" font-size="10" fill="#2e7d32">1 QP → N 目标，扩展性最佳</text>

  <!-- DC -->
  <rect x="370" y="44" width="320" height="200" fill="#e8f5e9" stroke="#2e7d32"/>
  <text x="530" y="64" text-anchor="middle" font-weight="bold" fill="#2e7d32">DC（Dynamic Connected，MLX 扩展）</text>
  <rect x="470" y="80" width="120" height="36" fill="#fff" stroke="#2e7d32"/>
  <text x="530" y="103" text-anchor="middle" font-size="11">DC QP（DCT 发起）</text>
  <text x="440" y="144" text-anchor="middle" font-size="10">节点 A DCT</text>
  <text x="530" y="144" text-anchor="middle" font-size="10">节点 B DCT</text>
  <text x="620" y="144" text-anchor="middle" font-size="10">节点 C DCT</text>
  <line x1="530" y1="116" x2="440" y2="138" stroke="#2e7d32" marker-end="url(#g)"/>
  <line x1="530" y1="116" x2="530" y2="138" stroke="#2e7d32" marker-end="url(#g)"/>
  <line x1="530" y1="116" x2="620" y2="138" stroke="#2e7d32" marker-end="url(#g)"/>
  <text x="530" y="176" text-anchor="middle" font-size="10">连接在 NIC 内动态建立/复用</text>
  <text x="530" y="194" text-anchor="middle" font-size="10">支持 WRITE/READ（RC 语义）</text>
  <text x="530" y="212" text-anchor="middle" font-size="10" fill="#2e7d32">可靠有序</text>
  <text x="530" y="230" text-anchor="middle" font-size="10" fill="#2e7d32">万节点 All-to-All 首选</text>

  <text x="360" y="264" text-anchor="middle" fill="#555" font-size="11">DC 是 Mellanox/NVIDIA 网卡私有扩展；跨厂商或纯 RoCE 环境需用 RC+XRC 替代</text>
  <defs>
    <marker id="o" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#ef6c00"/></marker>
    <marker id="g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#2e7d32"/></marker>
  </defs>
</svg>
