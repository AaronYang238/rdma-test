<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="280" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c62828"/>
    </marker>
  </defs>

  <rect width="720" height="280" fill="#fbfbfd"/>

  <text x="360" y="22" text-anchor="middle" font-weight="bold" font-size="13">
    RC QP 重传参数：retry_cnt / rnr_retry / timeout
  </text>

  <!-- RC QP 属性 box -->
  <rect x="20" y="38" width="280" height="120" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" rx="6"/>
  <text x="160" y="56" text-anchor="middle" font-weight="bold" fill="#1565c0" font-size="13">RC QP 属性</text>

  <!-- parameter rows -->
  <rect x="30" y="63" width="260" height="25" fill="#1565c0" rx="3"/>
  <text x="40" y="80" fill="white" font-weight="bold">retry_cnt:</text>
  <text x="130" y="80" fill="white">0–7（7=无限重传）— 通用重传</text>

  <rect x="30" y="95" width="260" height="25" fill="#1565c0" rx="3"/>
  <text x="40" y="112" fill="white" font-weight="bold">rnr_retry:</text>
  <text x="130" y="112" fill="white">0–7（7=无限）— RNR 重传</text>

  <rect x="30" y="127" width="260" height="25" fill="#1565c0" rx="3"/>
  <text x="40" y="144" fill="white" font-weight="bold">timeout:</text>
  <text x="130" y="144" fill="white">0=无限，4.096µs × 2^timeout</text>

  <!-- retry_cnt timeline -->
  <text x="340" y="50" text-anchor="middle" font-weight="bold" fill="#1565c0" font-size="12">retry_cnt 指数退避时序</text>

  <!-- Timeline baseline -->
  <line x1="310" y1="100" x2="700" y2="100" stroke="#1565c0" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="705" y="104" fill="#1565c0" font-size="11">时间</text>

  <!-- Initial send -->
  <line x1="320" y1="90" x2="320" y2="110" stroke="#1565c0" stroke-width="2"/>
  <text x="320" y="84" text-anchor="middle" fill="#1565c0" font-size="10">发送</text>

  <!-- Retry 1 (gap ~40px) -->
  <line x1="365" y1="90" x2="365" y2="110" stroke="#e65100" stroke-width="2"/>
  <text x="365" y="84" text-anchor="middle" fill="#e65100" font-size="10">重传1</text>
  <path d="M 320 115 Q 342 125 365 115" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="342" y="132" text-anchor="middle" fill="#555" font-size="9">T</text>

  <!-- Retry 2 (gap ~70px) -->
  <line x1="445" y1="90" x2="445" y2="110" stroke="#e65100" stroke-width="2"/>
  <text x="445" y="84" text-anchor="middle" fill="#e65100" font-size="10">重传2</text>
  <path d="M 365 115 Q 405 130 445 115" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="405" y="135" text-anchor="middle" fill="#555" font-size="9">2T</text>

  <!-- Retry 3 (gap ~110px) -->
  <line x1="565" y1="90" x2="565" y2="110" stroke="#e65100" stroke-width="2"/>
  <text x="565" y="84" text-anchor="middle" fill="#e65100" font-size="10">重传3</text>
  <path d="M 445 115 Q 505 135 565 115" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="505" y="140" text-anchor="middle" fill="#555" font-size="9">4T</text>

  <!-- Error terminal -->
  <rect x="595" y="82" width="90" height="26" fill="#c62828" rx="4"/>
  <text x="640" y="99" text-anchor="middle" fill="white" font-size="10">RETRY_EXC_ERR</text>
  <line x1="565" y1="100" x2="593" y2="95" stroke="#c62828" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- RNR timeline -->
  <text x="360" y="175" text-anchor="middle" font-weight="bold" fill="#1565c0" font-size="12">rnr_retry 时序</text>

  <line x1="310" y1="220" x2="700" y2="220" stroke="#1565c0" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="320" y1="210" x2="320" y2="230" stroke="#1565c0" stroke-width="2"/>
  <text x="320" y="204" text-anchor="middle" fill="#1565c0" font-size="10">SEND</text>

  <!-- RNR NAK arrow -->
  <path d="M 360 220 L 360 205 L 320 205 L 320 220" fill="none" stroke="#c62828" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="340" y="200" text-anchor="middle" fill="#c62828" font-size="9">RNR NAK</text>

  <line x1="410" y1="210" x2="410" y2="230" stroke="#e65100" stroke-width="2"/>
  <text x="410" y="204" text-anchor="middle" fill="#e65100" font-size="10">重传</text>
  <path d="M 360 235 Q 385 248 410 235" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="385" y="252" text-anchor="middle" fill="#555" font-size="9">RNR 定时器</text>

  <text x="490" y="220" fill="#2e7d32" font-size="11">→ 对端预投递 RECV WR 后正常完成</text>
</svg>
