<svg xmlns="http://www.w3.org/2000/svg" width="720" height="340" font-family="sans-serif" font-size="12">
  <rect width="720" height="340" fill="#fbfbfd"/>
  <text x="360" y="22" text-anchor="middle" font-weight="bold">一次 post_send 的硬件事务路径（PCIe 视角）</text>

  <rect x="40" y="50" width="180" height="240" fill="#e3f2fd" stroke="#1565c0"/>
  <text x="130" y="70" text-anchor="middle" font-weight="bold">CPU / 内存</text>
  <rect x="60" y="86" width="140" height="40" fill="#fff" stroke="#1565c0"/>
  <text x="130" y="104" text-anchor="middle" font-size="11">① 填 WQE 到 SQ</text>
  <text x="130" y="119" text-anchor="middle" font-size="10" fill="#999">(WB 内存)</text>
  <rect x="60" y="200" width="140" height="44" fill="#fff" stroke="#1565c0"/>
  <text x="130" y="220" text-anchor="middle" font-size="11">⑤ 读 CQE</text>
  <text x="130" y="235" text-anchor="middle" font-size="10" fill="#999">poll_cq</text>

  <rect x="500" y="50" width="180" height="240" fill="#ede7f6" stroke="#5e35b1"/>
  <text x="590" y="70" text-anchor="middle" font-weight="bold">RNIC (网卡)</text>
  <rect x="520" y="86" width="140" height="40" fill="#fff" stroke="#5e35b1"/>
  <text x="590" y="111" text-anchor="middle" font-size="11">② doorbell 寄存器</text>
  <rect x="520" y="140" width="140" height="40" fill="#fff" stroke="#5e35b1"/>
  <text x="590" y="160" text-anchor="middle" font-size="11">③ DMA 读 WQE</text>
  <text x="590" y="175" text-anchor="middle" font-size="10" fill="#999">+ 读数据 buffer</text>
  <rect x="520" y="200" width="140" height="44" fill="#fff" stroke="#5e35b1"/>
  <text x="590" y="220" text-anchor="middle" font-size="11">④ DMA 写 CQE</text>
  <text x="590" y="235" text-anchor="middle" font-size="10" fill="#999">完成后</text>

  <!-- arrows -->
  <line x1="200" y1="106" x2="520" y2="106" stroke="#c62828" stroke-width="2" marker-end="url(#a)"/>
  <text x="360" y="98" text-anchor="middle" fill="#c62828" font-size="11">MMIO 写 doorbell（WC 内存，CPU→NIC）</text>
  <line x1="520" y1="160" x2="200" y2="160" stroke="#2e7d32" stroke-width="2" marker-end="url(#g)"/>
  <text x="360" y="153" text-anchor="middle" fill="#2e7d32" font-size="11">PCIe DMA 读（NIC 主动）</text>
  <line x1="520" y1="222" x2="200" y2="222" stroke="#2e7d32" stroke-width="2" marker-end="url(#g)"/>
  <text x="360" y="215" text-anchor="middle" fill="#2e7d32" font-size="11">PCIe DMA 写 CQE</text>

  <text x="360" y="278" text-anchor="middle" fill="#555" font-size="11">延迟来源：MMIO 往返 + PCIe 事务 + 线缆传播；与系统调用/拷贝无关</text>
  <text x="360" y="306" text-anchor="middle" font-size="11" fill="#ef6c00">doorbell 区是 Write-Combining(WC)；数据/队列在普通 Write-Back(WB) 内存</text>
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#c62828"/></marker>
    <marker id="g" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#2e7d32"/></marker>
  </defs>
</svg>
