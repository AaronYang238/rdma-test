<svg xmlns="http://www.w3.org/2000/svg" width="720" height="300">
  <defs>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1565c0"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5e35b1"/>
    </marker>
  </defs>
  <rect width="720" height="300" fill="#fbfbfd"/>
  <text x="360" y="22" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333">RDMA 生态总览</text>

  <!-- Application layer -->
  <text x="360" y="52" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">应用层</text>
  <rect x="30" y="58" width="140" height="36" rx="5" fill="#ede7f6" stroke="#5e35b1" stroke-width="1.5"/>
  <text x="100" y="78" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5e35b1">AI 训练</text>
  <text x="100" y="91" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5e35b1">PyTorch / TF</text>

  <rect x="196" y="58" width="140" height="36" rx="5" fill="#ede7f6" stroke="#5e35b1" stroke-width="1.5"/>
  <text x="266" y="78" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5e35b1">分布式存储</text>
  <text x="266" y="91" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5e35b1">Ceph / MinIO</text>

  <rect x="362" y="58" width="140" height="36" rx="5" fill="#ede7f6" stroke="#5e35b1" stroke-width="1.5"/>
  <text x="432" y="78" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5e35b1">HPC</text>
  <text x="432" y="91" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5e35b1">MPI / OpenFOAM</text>

  <rect x="528" y="58" width="160" height="36" rx="5" fill="#ede7f6" stroke="#5e35b1" stroke-width="1.5"/>
  <text x="608" y="78" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5e35b1">高频交易</text>
  <text x="608" y="91" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5e35b1">Ultra-low latency</text>

  <!-- Middleware layer -->
  <text x="360" y="120" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">中间件 / 框架层</text>
  <rect x="30" y="126" width="148" height="48" rx="5" fill="#fff3e0" stroke="#ef6c00" stroke-width="1.5"/>
  <text x="104" y="146" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#ef6c00">NVMe-oF</text>
  <text x="104" y="160" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#ef6c00">存储 · nvme-rdma</text>
  <text x="104" y="170" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#ef6c00">READ/WRITE 块设备</text>

  <rect x="200" y="126" width="148" height="48" rx="5" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="274" y="146" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#2e7d32">NCCL</text>
  <text x="274" y="160" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#2e7d32">集合通信 · AllReduce</text>
  <text x="274" y="170" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#2e7d32">RC QP + WRITE + 原子</text>

  <rect x="370" y="126" width="148" height="48" rx="5" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="444" y="146" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1565c0">UCX</text>
  <text x="444" y="160" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1565c0">通信框架 · RC/UD/SHM</text>
  <text x="444" y="170" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1565c0">OpenMPI / PyTorch Dist</text>

  <rect x="540" y="126" width="148" height="48" rx="5" fill="#fce4ec" stroke="#c62828" stroke-width="1.5"/>
  <text x="614" y="146" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#c62828">SPDK</text>
  <text x="614" y="160" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#c62828">用户态存储 · NVMe-oF</text>
  <text x="614" y="170" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#c62828">DPDK 风格轮询</text>

  <!-- RDMA Verbs layer -->
  <rect x="30" y="220" width="658" height="50" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="360" y="242" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1565c0">RDMA Verbs 层 (libibverbs / librdmacm)</text>
  <text x="360" y="260" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1565c0">ibv_post_send · ibv_poll_cq · rdma_connect · ibv_reg_mr · ibv_create_qp …</text>

  <!-- Arrows from middleware to verbs -->
  <line x1="104" y1="174" x2="104" y2="218" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="274" y1="174" x2="274" y2="218" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="444" y1="174" x2="444" y2="218" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="614" y1="174" x2="614" y2="218" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- Arrows from app to middleware -->
  <line x1="100" y1="94" x2="104" y2="124" stroke="#5e35b1" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <line x1="266" y1="94" x2="274" y2="124" stroke="#5e35b1" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <line x1="432" y1="94" x2="444" y2="124" stroke="#5e35b1" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <line x1="608" y1="94" x2="614" y2="124" stroke="#5e35b1" stroke-width="1.5" marker-end="url(#arr-purple)"/>
</svg>
