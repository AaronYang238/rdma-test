<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <rect width="720" height="280" fill="#fbfbfd"/>
  <text x="360" y="22" text-anchor="middle" font-weight="bold" font-size="14">抓包与追踪工具</text>

  <!-- ibdump tool -->
  <rect x="40" y="46" width="160" height="36" rx="6" fill="#1565c0"/>
  <text x="120" y="65" text-anchor="middle" fill="white" font-weight="bold">ibdump</text>
  <text x="120" y="78" text-anchor="middle" fill="white" font-size="10">Mellanox 镜像端口</text>

  <!-- ibdump output -->
  <rect x="30" y="102" width="180" height="48" rx="4" fill="#2e7d32"/>
  <text x="120" y="118" text-anchor="middle" fill="white" font-weight="bold" font-size="11">捕获</text>
  <text x="40" y="134" fill="white" font-size="10">IB / RoCE 原始帧 (.pcap)</text>
  <text x="40" y="148" fill="white" font-size="10">完整报文含 BTH/RETH/AETH</text>

  <!-- ibdump analysis -->
  <rect x="40" y="168" width="160" height="36" rx="4" fill="#ef6c00"/>
  <text x="120" y="183" text-anchor="middle" fill="white" font-weight="bold" font-size="11">Wireshark 分析</text>
  <text x="120" y="197" text-anchor="middle" fill="white" font-size="10">IB 解析插件 / BTH 解码</text>

  <!-- tcpdump tool -->
  <rect x="280" y="46" width="160" height="36" rx="6" fill="#1565c0"/>
  <text x="360" y="65" text-anchor="middle" fill="white" font-weight="bold">tcpdump / tshark</text>
  <text x="360" y="78" text-anchor="middle" fill="white" font-size="10">RoCE v2 抓包</text>

  <!-- tcpdump output -->
  <rect x="270" y="102" width="180" height="48" rx="4" fill="#2e7d32"/>
  <text x="360" y="118" text-anchor="middle" fill="white" font-weight="bold" font-size="11">过滤</text>
  <text x="280" y="134" fill="white" font-size="10">RoCE over UDP port 4791</text>
  <text x="280" y="148" fill="white" font-size="10">tcpdump -i eth0 udp port 4791</text>

  <!-- tcpdump analysis -->
  <rect x="280" y="168" width="160" height="36" rx="4" fill="#ef6c00"/>
  <text x="360" y="183" text-anchor="middle" fill="white" font-weight="bold" font-size="11">协议解析</text>
  <text x="360" y="197" text-anchor="middle" fill="white" font-size="10">BTH / RETH / AETH headers</text>

  <!-- perf+eBPF tool -->
  <rect x="520" y="46" width="160" height="36" rx="6" fill="#1565c0"/>
  <text x="600" y="65" text-anchor="middle" fill="white" font-weight="bold">perf + eBPF</text>
  <text x="600" y="78" text-anchor="middle" fill="white" font-size="10">内核追踪</text>

  <!-- perf output -->
  <rect x="510" y="102" width="180" height="48" rx="4" fill="#2e7d32"/>
  <text x="600" y="118" text-anchor="middle" fill="white" font-weight="bold" font-size="11">探针</text>
  <text x="520" y="134" fill="white" font-size="10">uprobe on libibverbs</text>
  <text x="520" y="148" fill="white" font-size="10">bpftrace ibv_post_send 延迟</text>

  <!-- perf analysis -->
  <rect x="520" y="168" width="160" height="36" rx="4" fill="#ef6c00"/>
  <text x="600" y="183" text-anchor="middle" fill="white" font-weight="bold" font-size="11">可视化</text>
  <text x="600" y="197" text-anchor="middle" fill="white" font-size="10">Flamegraph 火焰图</text>

  <!-- Arrows tool → output -->
  <line x1="120" y1="82" x2="120" y2="100" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="360" y1="82" x2="360" y2="100" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="82" x2="600" y2="100" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrows output → analysis -->
  <line x1="120" y1="150" x2="120" y2="166" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="360" y1="150" x2="360" y2="166" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="150" x2="600" y2="166" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Labels -->
  <text x="120" y="240" text-anchor="middle" fill="#555" font-size="11">适用：IB 原生 / RoCE</text>
  <text x="360" y="240" text-anchor="middle" fill="#555" font-size="11">适用：RoCE v2 以太网</text>
  <text x="600" y="240" text-anchor="middle" fill="#555" font-size="11">适用：延迟剖析 / 瓶颈</text>
</svg>
